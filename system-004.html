/* ===== リセット ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff;
  color:#000;
}

/* ===== 画像共通 ===== */

img{
  width:100%;
  height:auto;
  display:block;
  vertical-align:bottom;
}

/* ===== リンク由来の隙間防止 ===== */

a{
  display:block;
  line-height:0;
}

/* ===== hoverエフェクト（PCのみ） ===== */

a{
  display:block;
  line-height:0;
  transition:opacity .25s;
}

@media (hover:hover){
a:hover{
  opacity:0.8;
}
}

/* ===== セクション余白完全削除 ===== */

section{
  margin:0;
  padding:0;

}

footer{
  margin-top:40px;
}

/* ===== スマホ ===== */

@media (max-width:768px){

.case-row{
  flex-direction:column;
}

.case-row a{
  width:100%;
}

.case-row a + a{

}

}

/* ===== エラー ===== */

#error{
